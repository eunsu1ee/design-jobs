name: collect-jobs

on:
  schedule:
    # UTC 기준. KST 09:00 / 12:00 / 15:00 / 18:00
    - cron: "0 0 * * *"
    - cron: "0 3 * * *"
    - cron: "0 6 * * *"
    - cron: "0 9 * * *"
  workflow_dispatch: {}   # 수동 실행 버튼

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install requests beautifulsoup4

      - name: Collect jobs
        env:
          SARAMIN_ACCESS_KEY: ${{ secrets.SARAMIN_ACCESS_KEY }}
        run: python collector.py

      - name: Commit jobs.json
        run: |
          git config user.name "job-board-bot"
          git config user.email "bot@users.noreply.github.com"
          git add docs/jobs.json
          git diff --cached --quiet || git commit -m "data: update jobs [skip ci]"
          git push
