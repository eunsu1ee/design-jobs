name: collect-jobs

on:
  schedule:
    # UTC 기준. 의도 시각 KST 06:00 / 10:00 / 14:00 / 17:00
    # (GitHub 스케줄은 보통 1~2시간 지연 실행됨 — 실제로는 그보다 늦게 돎)
    - cron: "0 21 * * *"
    - cron: "0 1 * * *"
    - cron: "0 5 * * *"
    - cron: "0 8 * * *"
  workflow_dispatch: {}   # 수동 실행 버튼

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install requests beautifulsoup4

      - name: Collect jobs
        env:
          SARAMIN_ACCESS_KEY: ${{ secrets.SARAMIN_ACCESS_KEY }}
        run: python collector.py

      - name: Commit jobs.json
        run: |
          git config user.name "job-board-bot"
          git config user.email "bot@users.noreply.github.com"
          git add docs/jobs.json
          git diff --cached --quiet || git commit -m "data: update jobs"
          git push
